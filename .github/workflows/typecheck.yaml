on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  typecheck-mobile:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Setup repo
        uses: actions/checkout@v3

      - name: 🏗 Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20.x
          cache: npm

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🎨 Generate uniwind types
        run: npx expo export --platform ios --output-dir .expo-export --clear
        working-directory: apps/mobile

      - name: 🧪 Run typecheck
        run: npm run typecheck
        working-directory: apps/mobile

  typecheck-web:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Setup repo
        uses: actions/checkout@v3

      - name: 🏗 Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20.x
          cache: npm

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🧪 Run typecheck
        run: npm run typecheck
        working-directory: apps/web
